<!DOCTYPE html>
<html>
<head>
    <title>Verify Code</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh;}
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 320px; text-align: center;}
        input { display: block; margin: 15px 0; padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 18px; letter-spacing: 4px;}
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;}
        button:hover { background: #218838; }
        .messages { list-style: none; padding: 0; text-align: left;}
        .messages li { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .messages .error { background: #ffe6e6; color: #cc0000; }
        .messages .success { background: #e6ffe6; color: #00cc00; }
    </style>
</head>
<body>

<div class="container">
    <h2>Enter Verification Code</h2>
    <p>We sent a 6-digit security OTP code to your registered email address.</p>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp_code" placeholder="000000" maxlength="6" required autocomplete="off">
        <button type="submit">Verify and Activate</button>
    </form>
</div>

</body>
</html>
