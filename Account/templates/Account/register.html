{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="{%static 'css/Account/register.css' %}">
    <link rel="icon" type="image/png" href="{% static 'image/logo/logo1.png' %}">
</head>

<body>
    <div class="page-container">
        <div class="image-container">
            {% load static %}
            <img src="{% static 'image/register/registerimg.png' %}" alt="Register Image">
        </div>

        <div class="container">
            <h2>Register</h2>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required>
                    <label>Username</label>
                </div>

                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <label>Email</label>
                </div>

                <div class="form-group">
                    <select name="role" required>
                        <option value="" disabled selected>Select Your Role</option>
                        <option value="OWNER">Business Owner</option>
                        <option value="MANAGER">Manager</option>
                        <option value="EMPLOYEE">Employee</option>
                        <option value="CUSTOMER">Customer</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="password" name="password1" placeholder="Password" required>
                    <label>Password</label>
                </div>

                <div class="form-group">
                    <input type="password" name="password2" placeholder="Confirm Password" required>
                    <label>Confirm Password</label>
                </div>

                <button type="submit">Register</button>
                <div>

                    <p>Have an account? <a href="{% url 'login' %}">Login</a></p>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
