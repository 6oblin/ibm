<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh;}
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
        input { display: block; margin: 10px 0; padding: 8px; width: 100%; }
        .error { color: red; }
        .success { color: green; }
        .messages { list-style: none; padding: 0; }
        .messages li { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .messages .error { background: #ffe6e6; color: #cc0000; }
        .messages .success { background: #e6ffe6; color: #00cc00; }
        .messages .info { background: #e6f2ff; color: #0066cc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>

</body>
</html>
