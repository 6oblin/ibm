{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/Account/login.css' %}">
</head>

<body>

    <div class="container">
        <img src="{%static 'image/logo/icebear.png' %}" alt="user">
        <h2>User Login</h2>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <div class="remember_me">
                <label for="remember">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" style=" display:flex; justify-content: center; align-items:center;">Forget Password?</a>
            </div>

            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>

</body>

</html>
