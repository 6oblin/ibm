{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/Account/login.css' %}">
    <link rel="icon" type="image/png" href="{% static 'image/logo/logo1.png' %}">
</head>

<body>

<div class="page-container">

    <!-- LOGIN FORM SIDE -->
    <div class="container">

        <h2>Login</h2>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="username" placeholder=" " required>
                <label>Username</label>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder=" " required>
                <label>Password</label>
            </div>

            <div class="remember_me">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Login</button>

            <p>
                Don't have an account?
                <a href="{% url 'register' %}" class="link_class">Register</a>
            </p>

        </form>
    </div>
        <!-- IMAGE SIDE -->
    <div class="image-container">
        <img src="{% static 'image/logo/logo1.png' %}" alt="Login Image">
    </div>
</div>

</body>
</html>
